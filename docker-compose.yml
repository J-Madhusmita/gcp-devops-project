version: "3.8"

services:

  mysql:
    image: mysql:8.0
    container_name: employee-mysql
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: employee

    ports:
      - "3308:3306"

    volumes:
    - mysql-data:/var/lib/mysql
    - ./backend/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  backend:
    build: ./backend
    container_name: employee-backend

    ports:
      - "5001:5000"

    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root123
      DB_NAME: employee

      JWT_SECRET: mysecretkey

      PROJECT_ID: gcp-devops-project-501115
      BUCKET_NAME: gcp-devops-project-501115-employee-docs

    depends_on:
      - mysql

  frontend:
    build: ./frontend
    container_name: employee-frontend

    ports:
      - "5173:5173"

    depends_on:
      - backend

volumes: 
  mysql-data: