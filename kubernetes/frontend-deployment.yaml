apiVersion: apps/v1
kind: Deployment

metadata:
  name: frontend
  namespace: employee-app

spec:
  replicas: 1

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
      - name: frontend

        image: asia-south1-docker.pkg.dev/gcp-devops-project-501115/employee-app-repo/employee-frontend:v3

        imagePullPolicy: Always

        ports:
        - containerPort: 80

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"