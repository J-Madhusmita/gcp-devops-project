apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend
  namespace: employee-app

spec:
  replicas: 1

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
      - name: backend
        image: asia-south1-docker.pkg.dev/gcp-devops-project-501115/employee-app-repo/employee-backend:v3
        imagePullPolicy: Always

        ports:
        - containerPort: 5000

        livenessProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3

        resources:
          requests:
            cpu: "250m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"

        envFrom:
        - configMapRef:
            name: backend-config
        - secretRef:
            name: backend-secret